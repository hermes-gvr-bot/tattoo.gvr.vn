services:
  postgres:
    image: postgres:16-alpine
    container_name: tattoo-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=tattoo
      - POSTGRES_PASSWORD=tattoo_prod_2026
      - POSTGRES_DB=tattoo_consultation
    volumes:
      - tattoo-pgdata:/var/lib/postgresql/data
    networks:
      - tattoo-net

  backend:
    image: alpine:3.21
    container_name: tattoo-backend
    restart: unless-stopped
    command: /app/server
    volumes:
      - ./server:/app/server:ro
      - ./uploads:/app/uploads
    environment:
      - PORT=5200
      - DATABASE_URL=postgres://tattoo:tattoo_prod_2026@tattoo-postgres:5432/tattoo_consultation?sslmode=disable
      - JWT_SECRET=tattoo-prod-jwt-secret-2026
      - UPLOAD_DIR=/app/uploads
      - S3_ENDPOINT=100.86.223.10:9010
      - S3_ACCESS_KEY=tattoo-backend
      - S3_SECRET_KEY=tattoo-backend-secret
      - S3_BUCKET=tattoo-consultation
      - S3_PUBLIC_URL=http://100.86.223.10:9010
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY}
      - REPLICATE_API_KEY=${REPLICATE_API_KEY}
    depends_on:
      - postgres
    networks:
      - tattoo-net
      - traefik_default

  frontend:
    image: nginx:alpine
    container_name: tattoo-frontend
    restart: unless-stopped
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_default
      - traefik.http.services.tattoo.loadbalancer.server.port=80
      - traefik.http.routers.tattoo.rule=Host(`tattoo.gvr.vn`)
      - traefik.http.routers.tattoo.entrypoints=websecure
      - traefik.http.routers.tattoo.tls=true
      - traefik.http.routers.tattoo.tls.certresolver=dns-cloudflare
    networks:
      - traefik_default
      - tattoo-net

networks:
  tattoo-net:
  traefik_default:
    external: true

volumes:
  tattoo-pgdata:
