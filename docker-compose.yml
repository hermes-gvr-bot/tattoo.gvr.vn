services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tattoo
      POSTGRES_PASSWORD: tattoo_dev
      POSTGRES_DB: tattoo_consultation
    ports:
      - "5437:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tattoo"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
